{% extends "base.html" %}
{% block title %}管理员登录 — PCAS Keepalive{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-16">
  <div class="bg-white border border-slate-200 rounded-2xl shadow-sm p-8">
    <h2 class="text-2xl font-semibold mb-1 text-slate-900">管理员登录</h2>
    <p class="text-sm text-slate-500 mb-6">输入你在首次设置时创建的管理员账号</p>

    <form id="form-admin-login" class="space-y-4">
      <div>
        <label class="text-xs font-medium text-slate-600 mb-1.5 block">用户名</label>
        <input name="username" type="text" autocomplete="username" required
               class="w-full px-3 py-2 rounded-lg bg-white border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none transition">
      </div>
      <div>
        <label class="text-xs font-medium text-slate-600 mb-1.5 block">密码</label>
        <input name="password" type="password" autocomplete="current-password" required
               class="w-full px-3 py-2 rounded-lg bg-white border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none transition">
      </div>
      <button type="submit"
              class="w-full py-2.5 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white font-medium transition shadow-sm">
        登录
      </button>
    </form>

    <p id="login-msg" class="text-sm mt-4 min-h-[1.5em]"></p>
  </div>

  <p class="text-xs text-slate-500 mt-4 text-center">
    忘记管理员密码？删除 <code class="px-1.5 py-0.5 bg-slate-100 rounded text-slate-700">pcas.db</code> 重新启动即可重新设置（移动云账号也会一并清空）。
  </p>
</div>

<script>
function setMsg(t, err) {
  const el = document.getElementById('login-msg');
  el.textContent = t || '';
  el.className = 'text-sm mt-4 min-h-[1.5em] ' + (err ? 'text-rose-600' : 'text-emerald-600');
}

document.getElementById('form-admin-login').addEventListener('submit', async (e) => {
  e.preventDefault();
  setMsg('登录中…');
  const fd = new FormData(e.target);
  const r = await fetch('/admin/login', { method: 'POST', body: fd });
  const b = await r.json().catch(() => ({}));
  if (r.status === 200 && b.ok) {
    setMsg('登录成功');
    location.href = '/';
  } else {
    setMsg('登录失败: ' + (b.msg || r.status), true);
  }
});
</script>
{% endblock %}
